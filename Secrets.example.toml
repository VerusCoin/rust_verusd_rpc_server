# Fill out this file, rename it to Secrets.toml, then run

rpc_user = "RPC_USER"
rpc_password = "RPC_PASSWORD"

tls_cert_path = "/path/to/fullchain.pem"
tls_key_path  = "/path/to/privkey.pem"

# API key authentication (optional).
# Each entry maps an app ID to its shared secret. When this section is present
# and non-empty, every request must include X-App-ID, X-Timestamp (ms since
# epoch), and X-Auth-Token headers. The token is BLAKE2b-512 over:
#   time_string | api_key | method_name | app_id
# Leave this section commented out to disable authentication entirely.
# [api_keys]
# my-app = "replace-with-a-long-random-secret"
